# krateo-alert-troubleshooter — the HyperDX-alert → Autopilot-analysis handler. HyperDX posts a
# fired alert to http://krateo-alert-troubleshooter.krateo-system.svc:8080/webhook; the handler
# calls the Autopilot A2A agent and writes a TroubleshootingReport CR. Image is a placeholder
# (ghcr.io/braghettos/krateo-alert-troubleshooter:dev) — swap for the pushed tag.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: krateo-alert-troubleshooter
  namespace: krateo-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: krateo-alert-troubleshooter
  namespace: krateo-system
rules:
  - apiGroups: ["observability.krateo.io"]
    resources: ["troubleshootingreports", "troubleshootingreports/status"]
    verbs: ["create", "get", "list", "patch", "update"]
  # the reconciler reads Alert CRs (desired) and writes their status (mirrored HyperDX state)
  - apiGroups: ["observability.krateo.io"]
    resources: ["alerts", "alerts/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # the key-bootstrap Job (same SA) writes the hyperdx-api-token Secret
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: krateo-alert-troubleshooter
  namespace: krateo-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: krateo-alert-troubleshooter
subjects:
  - kind: ServiceAccount
    name: krateo-alert-troubleshooter
    namespace: krateo-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: krateo-alert-troubleshooter
  namespace: krateo-system
  labels: { app: krateo-alert-troubleshooter }
spec:
  replicas: 1
  selector:
    matchLabels: { app: krateo-alert-troubleshooter }
  template:
    metadata:
      labels: { app: krateo-alert-troubleshooter }
    spec:
      serviceAccountName: krateo-alert-troubleshooter
      containers:
        - name: handler
          image: ghcr.io/braghettos/krateo-alert-troubleshooter:latest
          ports:
            - containerPort: 8080
          env:
            - name: NAMESPACE
              value: krateo-system
            - name: AUTOPILOT_A2A_URL
              value: http://krateo-autopilot.krateo-system.svc:8080/
            - name: REPORT_COOLDOWN
              value: "1800"     # dedup window (s): don't re-analyze the same alert within this
            # --- reconciler (Alert CRs -> HyperDX session API) ---
            - name: HYPERDX_URL
              value: http://krateo-clickstack.krateo-system.svc:3000
            - name: HYPERDX_ADMIN_EMAIL
              valueFrom: { secretKeyRef: { name: hyperdx-admin-creds, key: email } }
            - name: HYPERDX_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: hyperdx-admin-creds, key: password } }
            - name: RECONCILE_INTERVAL
              value: "60"
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: krateo-alert-troubleshooter
  namespace: krateo-system
spec:
  # Headless: this bench cluster's ClusterIP range is exhausted; a headless service still
  # resolves krateo-alert-troubleshooter.krateo-system.svc → the pod IP for HyperDX's webhook POST.
  clusterIP: None
  selector: { app: krateo-alert-troubleshooter }
  ports:
    - port: 8080
      targetPort: 8080
