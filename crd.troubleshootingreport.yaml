# TroubleshootingReport — the record of an auto-run Autopilot root-cause analysis, created
# by the alert-troubleshooter handler when a HyperDX alert fires. spec captures what triggered
# it (the firing alert + the prompt); status holds the Autopilot analysis (markdown) + phase.
# The portal Alerts section lists these and shows the report per alert.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: troubleshootingreports.observability.krateo.io
spec:
  group: observability.krateo.io
  scope: Namespaced
  names:
    kind: TroubleshootingReport
    listKind: TroubleshootingReportList
    plural: troubleshootingreports
    singular: troubleshootingreport
    shortNames: [tsr]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Alert
          type: string
          jsonPath: .spec.alertName
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Triggered
          type: string
          jsonPath: .spec.triggeredAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [alertName]
              properties:
                alertName:
                  type: string
                  description: The firing HyperDX alert (Alert CR) name.
                alertNamespace:
                  type: string
                alertState:
                  type: string
                  description: The alert state that triggered this (usually ALERT).
                prompt:
                  type: string
                  description: The troubleshooting prompt sent to the Autopilot agent.
                triggeredAt:
                  type: string
                  description: When the webhook fired (RFC3339).
                hyperdxAlertId:
                  type: string
                  description: HyperDX-internal alert id from the webhook payload.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Analyzing, Ready, Failed]
                  description: Lifecycle of the analysis.
                report:
                  type: string
                  description: The Autopilot end-to-end root-cause analysis (markdown).
                error:
                  type: string
                completedAt:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type: { type: string }
                      status: { type: string }
                      reason: { type: string }
                      message: { type: string }
                      lastTransitionTime: { type: string }
